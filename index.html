<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Detroit Dash — Daily Dash</title>
  <meta name="description" content="Detroit Dash — a daily one-shot dodge-runner. One button. One course a day. Same for everyone." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- TODO(v1.0): favicon + social share (og:image) once art exists (§7, §1). -->
  <main id="game">
    <!-- HUD: live score (distance), current streak, puzzle number (§5, §7). -->
    <header id="hud">
      <span id="hud-puzzle">Detroit Dash #—</span>
      <span id="hud-score">0 m</span>
      <span id="hud-streak">🔥 0</span>
    </header>

    <!-- Canvas is the whole game surface. Size is set in JS from devicePixelRatio (§8, renderer). -->
    <canvas id="stage" width="800" height="450" aria-label="Detroit Dash game area"></canvas>

    <!-- TODO(v1.0): result screen overlay — score, distance, best, streak, Share button, countdown (§5, §6).
         Rendered/toggled by main.js; markup can live here hidden or be built in JS. -->
    <section id="result" hidden>
      <!-- TODO(v1.0): populated on death or on one-shot lock. -->
    </section>

    <!-- One-line hint; the game needs no tutorial (success criteria §1). -->
    <p id="hint">Tap, click, Space, or ↑ to jump</p>
  </main>

  <script type="module" src="src/main.js"></script>
</body>
</html>
