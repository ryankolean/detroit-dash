<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Detroit Dash — Daily Dash</title>
  <meta name="description" content="Detroit Dash — a daily one-shot dodge-runner. One button. One course a day. Same for everyone." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- TODO(v1.0): favicon + social share (og:image) once art exists (§7, §1). -->
  <main id="game">
    <!-- HUD: live score (distance), current streak, puzzle number (§5, §7). -->
    <header id="hud">
      <span id="hud-puzzle">Detroit Dash #—</span>
      <span id="hud-score">0 m</span>
      <span id="hud-streak">🔥 0</span>
      <button id="stats-btn" type="button" aria-label="View stats and history">📊</button>
      <button id="mute-btn" type="button" aria-label="Toggle sound">🔊</button>
    </header>

    <!-- Canvas is the whole game surface. It letterboxes to fit the leftover box
         (width- or height-bound) so the full field is always visible (§8, renderer). -->
    <div id="stage-wrap">
      <canvas id="stage" width="800" height="450" role="img" aria-label="Detroit Dash game area"></canvas>
    </div>

    <!-- Result / lock overlay — populated by main.js on death or one-shot lock (§5, §6). -->
    <section id="result" role="dialog" aria-modal="true" aria-label="Run result" hidden></section>

    <!-- Stats / history overlay (v1.3) — populated by main.js when opened. -->
    <section id="stats" role="dialog" aria-modal="true" aria-label="Stats and history" hidden></section>

    <!-- One-line hint; the game needs no tutorial (success criteria §1). -->
    <p id="hint">Tap, click, Space, or ↑ to jump</p>
  </main>

  <script type="module" src="src/main.js"></script>
</body>
</html>
