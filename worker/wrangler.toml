name = "detroit-dash-board"
main = "index.js"
compatibility_date = "2026-07-15"

# KV namespace for the daily boards. Create it, then paste the id below:
#   wrangler kv namespace create BOARD
[[kv_namespaces]]
binding = "BOARD"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Lock CORS to the game's origin. Update if the Pages URL changes.
[vars]
ALLOWED_ORIGIN = "https://ryankolean.github.io"
